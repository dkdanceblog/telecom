<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Телекомыч ловит задачи</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="wrap">
    <canvas id="game" width="1536" height="1024"></canvas>
    <div class="mobile-controls" aria-label="Управление">
      <button id="leftBtn">←</button>
      <button id="startBtn">СТАРТ / ПРЫЖОК</button>
      <button id="pauseBtn">⏸</button>
      <button id="rightBtn">→</button>
    </div>
  </main>
  <div class="orientation-lock" aria-hidden="true">
    <div class="orientation-card">
      <div class="orientation-icon">📱</div>
      <div class="orientation-title">Поверните телефон</div>
      <div class="orientation-text">Телекомыч лучше ловит задачи в вертикальном режиме</div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
